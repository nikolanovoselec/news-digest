name = "ai-news-digest"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/_merged.mjs"
assets = { directory = "./dist", binding = "ASSETS" }

# Custom domain is NOT declared here. Hardcoding the hostname here would
# force every fork to edit this file before deploy. Instead, the Deploy
# GitHub Action reads the APP_URL secret, extracts its hostname, and calls
# the Cloudflare Workers Custom Domains API to bind it after `wrangler
# deploy`. See .github/workflows/deploy.yml step "Bind custom domain".

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "ai-news-digest"
database_id = "633eb7e8-0930-46bb-b1a9-f35587290bf8"
migrations_dir = "./migrations"

[[kv_namespaces]]
binding = "KV"
id = "34a836c647a4453fb167e60d00b06f0d"

# Global-feed queues (REQ-PIPE-001, REQ-PIPE-002). The hourly coordinator
# receives one message per :00 tick; the chunk consumer handles one
# ~100-candidate LLM call per message.
[[queues.producers]]
binding = "SCRAPE_COORDINATOR"
queue = "scrape-coordinator"

[[queues.producers]]
binding = "SCRAPE_CHUNKS"
queue = "scrape-chunks"

[[queues.consumers]]
queue = "scrape-coordinator"
max_batch_size = 1
max_retries = 3

[[queues.consumers]]
queue = "scrape-chunks"
max_batch_size = 1
max_retries = 3

[ai]
binding = "AI"

# Cron triggers:
#   0 * * * *   — hourly global-feed coordinator (REQ-PIPE-001)
#   0 3 * * *   — daily retention cleanup (REQ-PIPE-005)
#   */5 * * * * — email dispatcher + discovery drain (REQ-MAIL-001 +
#                 REQ-DISC-003)
[triggers]
crons = ["0 * * * *", "0 3 * * *", "*/5 * * * *"]

[vars]
# APP_URL is set as a Worker secret (different per deployment target)
