name = "ai-news-digest"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/_merged.mjs"
assets = { directory = "./dist", binding = "ASSETS" }
# Disable the *.workers.dev subdomain. Cloudflare Access does NOT enforce
# its policy on the workers.dev URL — leaving it enabled would let an
# attacker hit the Worker bypassing Access entirely (see AD11 / CF-031).
# Forks WITHOUT Cloudflare Access bound may set this back to true; forks
# WITH Access in production should leave it false to close the bypass.
workers_dev = false

# IMPORTANT — production resource IDs.
# `database_id` and the KV `id` below are the live production resources
# for news.graymatter.ch. Running `wrangler` against this file from an
# unaudited fork or unfamiliar environment can corrupt prod state in
# ways that are hard to reverse (e.g., `wrangler d1 migrations apply
# DB --remote` will mutate the production schema). Forks MUST bootstrap
# their own resources via `scripts/bootstrap-resources.sh` and replace
# both IDs before any remote `wrangler` command.

# Custom domain is NOT declared here. Hardcoding the hostname here would
# force every fork to edit this file before deploy. Instead, the Deploy
# GitHub Action reads the APP_URL secret, extracts its hostname, and calls
# the Cloudflare Workers Custom Domains API to bind it after `wrangler
# deploy`. See .github/workflows/deploy.yml step "Bind custom domain".

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "ai-news-digest"
database_id = "633eb7e8-0930-46bb-b1a9-f35587290bf8"
migrations_dir = "./migrations"

[[kv_namespaces]]
binding = "KV"
id = "34a836c647a4453fb167e60d00b06f0d"

# Global-feed queues (REQ-PIPE-001, REQ-PIPE-002). The coordinator runs
# every 4 hours (cron `0 */4 * * *`) and emits one message per tick; the
# chunk consumer handles one ~100-candidate LLM call per message.
[[queues.producers]]
binding = "SCRAPE_COORDINATOR"
queue = "scrape-coordinator"

[[queues.producers]]
binding = "SCRAPE_CHUNKS"
queue = "scrape-chunks"

# REQ-PIPE-008: cross-chunk semantic dedup pass. The chunk consumer that
# closes the run enqueues exactly one finalize message; this consumer
# runs the post-merge LLM call over the run's surviving article titles.
[[queues.producers]]
binding = "SCRAPE_FINALIZE"
queue = "scrape-finalize"

# REQ-PIPE-003 AC 9: queue-driven historical-dedup sweep. Decouples the
# corpus-wide sweep from the operator's browser tab — the kicker
# enqueues one message; the consumer runs one bounded batch per
# message and re-enqueues a continuation until done.
[[queues.producers]]
binding = "DEDUP_SWEEP"
queue = "dedup-sweep"

[[queues.consumers]]
queue = "scrape-coordinator"
max_batch_size = 1
max_retries = 3

[[queues.consumers]]
queue = "scrape-chunks"
max_batch_size = 1
max_retries = 3

[[queues.consumers]]
queue = "scrape-finalize"
max_batch_size = 1
max_retries = 3

[[queues.consumers]]
queue = "dedup-sweep"
max_batch_size = 1
max_retries = 3

[ai]
binding = "AI"

# Cron triggers:
#   0 */4 * * * — global-feed coordinator every 4 hours (REQ-PIPE-001)
#   0 3 * * *   — daily retention cleanup (REQ-PIPE-005)
#   */5 * * * * — email dispatcher + discovery drain (REQ-MAIL-001 +
#                 REQ-DISC-003)
[triggers]
crons = ["0 */4 * * *", "0 3 * * *", "*/5 * * * *"]

# REQ-PIPE-003 — Cloudflare Vectorize index for semantic article
# dedup. Populated by the chunk-consumer (each new article → one
# upsert) and queried by the finalize-consumer + admin
# historical-dedup route. 768-dim cosine to match the
# bge-base-en-v1.5 embedding model. Create via:
#   npx -y wrangler vectorize create ai-news-embeddings \
#       --dimensions=768 --metric=cosine
# See AD33 for the embeddings + Vectorize ADR.
[[vectorize]]
binding = "VECTORIZE"
index_name = "ai-news-embeddings"

[vars]
# APP_URL is set as a Worker secret (different per deployment target)
# CF-004 — single source of truth for the queue retry cap. Both the
# Cloudflare-side per-queue `max_retries` literals and the worker
# code's batch handler read this value (via `env.QUEUE_MAX_RETRIES`)
# so a future bump only changes one place. Integers must be quoted as
# strings here; the consumer `Number.parseInt`s them.
QUEUE_MAX_RETRIES = "3"

# REQ-PIPE-003 — cosine threshold for semantic dedup. Validated
# 2026-05-06 against 11 production articles: 0.85 catches the
# same-event Anthropic financial-AI cluster (pairwise 0.81-0.91)
# without false-merging different events (Verisk announcement,
# EPAM hiring at 0.77-0.84). Operators may tune via the same key
# without a code change. Float, string-typed for parity with
# QUEUE_MAX_RETRIES.
DEDUP_COSINE_THRESHOLD = "0.85"
# REQ-PIPE-003 AC 11 — same-vendor cosine penalty, subtracted from
# the raw cosine before the threshold gate when both articles share
# an eTLD+1. Lifts the effective same-publisher threshold to 0.90,
# neutralising publisher-style boilerplate that inflated cosines on
# the LLM-summary embeddings (the dominant FP class in the 2026-05-06
# integration sweep). Float, string-typed; clamp [0,1] in code.
DEDUP_SAME_VENDOR_PENALTY = "0.05"
# REQ-PIPE-009 - lower bound of the LLM-rerank borderline band.
# Cosines in [DEDUP_RERANK_FLOOR, DEDUP_COSINE_THRESHOLD) are sent
# to the LLM for a binary same-event check; below the floor the
# pair stays distinct without an LLM call. 0.72 matches the upper
# edge of "unrelated topics" in the 2026-05-06 validation sweep.
DEDUP_RERANK_FLOOR = "0.72"

# ---------------------------------------------------------------------------
# Integration environment — `wrangler deploy --env integration` targets a
# fully isolated copy of every resource so risky changes (Astro major bumps,
# CSP tightening, schema migrations) can be smoke-tested on the live edge
# without touching production. All resources carry the `-integration`
# suffix; cron triggers are intentionally OFF (no autonomous LLM spend on
# integration; force-refresh via /api/admin/force-refresh for manual runs).
# Bootstrap on first deploy: scripts/bootstrap-resources.sh creates the
# resources by name, captures their IDs, and patches this file in CI.
# ---------------------------------------------------------------------------

[env.integration]
name = "ai-news-digest-integration"
main = "./dist/_worker.js/_merged.mjs"
assets = { directory = "./dist", binding = "ASSETS" }

[env.integration.vars]
# CF-004 — must match the top-level [vars] QUEUE_MAX_RETRIES; the
# integration env doesn't inherit top-level vars automatically.
QUEUE_MAX_RETRIES = "3"
# REQ-PIPE-003 — same threshold as production. Forks tuning their
# own corpus may override here without touching prod.
DEDUP_COSINE_THRESHOLD = "0.85"
# REQ-PIPE-003 AC 11 — see top-level vars block for rationale.
DEDUP_SAME_VENDOR_PENALTY = "0.05"
# REQ-PIPE-009 - see top-level vars block for rationale.
DEDUP_RERANK_FLOOR = "0.72"

[env.integration.observability]
enabled = true

[[env.integration.d1_databases]]
binding = "DB"
database_name = "ai-news-digest-integration"
database_id = "TBD-bootstrap-on-first-deploy"
migrations_dir = "./migrations"

[[env.integration.kv_namespaces]]
binding = "KV"
id = "TBD-bootstrap-on-first-deploy"

[[env.integration.queues.producers]]
binding = "SCRAPE_COORDINATOR"
queue = "scrape-coordinator-integration"

[[env.integration.queues.producers]]
binding = "SCRAPE_CHUNKS"
queue = "scrape-chunks-integration"

[[env.integration.queues.producers]]
binding = "SCRAPE_FINALIZE"
queue = "scrape-finalize-integration"

[[env.integration.queues.producers]]
binding = "DEDUP_SWEEP"
queue = "dedup-sweep-integration"

[[env.integration.queues.consumers]]
queue = "scrape-coordinator-integration"
max_batch_size = 1
max_retries = 3

[[env.integration.queues.consumers]]
queue = "scrape-chunks-integration"
max_batch_size = 1
max_retries = 3

[[env.integration.queues.consumers]]
queue = "scrape-finalize-integration"
max_batch_size = 1
max_retries = 3

[[env.integration.queues.consumers]]
queue = "dedup-sweep-integration"
max_batch_size = 1
max_retries = 3

[env.integration.ai]
binding = "AI"

# REQ-PIPE-003 — integration uses its own Vectorize index so a
# integration retention sweep can never delete production vectors.
# Create via:
#   npx -y wrangler vectorize create ai-news-embeddings-integration \
#       --dimensions=768 --metric=cosine
[[env.integration.vectorize]]
binding = "VECTORIZE"
index_name = "ai-news-embeddings-integration"

# Crons are intentionally disabled on integration. Trigger scrape runs
# manually via /api/admin/force-refresh (or the consolidated "Run
# pipeline now" button on /settings). Note: omitting this section
# would NOT disable crons — wrangler inherits the top-level
# `crons = [...]` array into every env that doesn't override it.
# The empty array below is the actual override.
[env.integration.triggers]
crons = []

# APP_URL for integration is NOT hardcoded here. The deploy workflow
# reads `vars.APP_URL` from the GitHub Environment named "integration"
# and pushes it as a Worker secret at deploy time. Forks set their
# own integration hostname under Settings → Environments → integration
# → Variables → APP_URL. Falls back to the *.workers.dev URL
# Cloudflare auto-assigns when the variable is unset.
