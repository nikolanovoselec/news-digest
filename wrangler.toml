name = "ai-news-digest"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"
assets = { directory = "./dist", binding = "ASSETS" }

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "ai-news-digest"
database_id = "633eb7e8-0930-46bb-b1a9-f35587290bf8"
migrations_dir = "./migrations"

[[kv_namespaces]]
binding = "KV"
id = "34a836c647a4453fb167e60d00b06f0d"

[[queues.producers]]
binding = "DIGEST_JOBS"
queue = "digest-jobs"

[[queues.consumers]]
queue = "digest-jobs"
max_batch_size = 1
max_retries = 3

[ai]
binding = "AI"

[triggers]
crons = ["*/5 * * * *"]

[vars]
# APP_URL is set as a Worker secret (different per deployment target)
