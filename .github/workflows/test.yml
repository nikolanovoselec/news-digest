name: PR Checks
# Fires on:
#   - push to develop (fast feedback on work-in-progress)
#   - push to main (post-merge regression gate; deploy fires only on green)
#   - pull_request targeting main OR develop (pre-merge gate)
#   - workflow_dispatch (manual re-run)
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      # CF-048 / AD28 — audit the production-dep tree at TWO levels:
      #   - HIGH+: visible in CI logs (continue-on-error) so operators
      #     see Dependabot triage candidates on every push without
      #     blocking the build on transitive-only CVEs.
      #   - CRITICAL+: blocking. Real production-runtime exposure is
      #     gated here.
      # Why this split: @astrojs/cloudflare is a production dep that
      # transitively pulls miniflare/wrangler/undici. Those tools run
      # at build/dev time only; the deployed Workers bundle runs on
      # workerd which uses its own fetch, NOT undici. A HIGH undici
      # CVE in node_modules has no production attack surface but
      # would block every PR. The repo's Dependabot channel resolves
      # those transitives over time. AD28 records why HIGH does not
      # block; do not re-tighten without checking transitive scope
      # against workerd runtime first.
      - name: npm audit (production deps, high+ - advisory only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - name: npm audit (production deps, critical+ - blocking)
        run: npm audit --omit=dev --audit-level=critical

      - name: Lint
        run: npm run lint

      # CF-069 — fail the build when source/tests/docs reference a REQ
      # id that doesn't exist in sdd/. Catches drift between docs +
      # SDD spec ahead of doc-updater's per-push pass.
      - name: REQ backlink coverage
        run: node scripts/check-req-backlinks.mjs

      # AD20 — fail the build if any src/pages/** or src/components/**
      # statically imports a top-level src/scripts/*.ts file. That
      # double-bundles the script (standalone IIFE + page chunk),
      # which silently registered duplicate document-level listeners
      # and broke favourite toggles in PRs #182/#184/#185.
      - name: Pattern B import discipline (AD20)
        run: node scripts/check-no-page-pattern-b.mjs

      - name: Dead code check
        run: npm run knip

      - name: Type check
        run: npm run typecheck

      - name: Build (populates dist/ for Workers test pool)
        run: npm run build

      - name: Tests
        run: npm test
