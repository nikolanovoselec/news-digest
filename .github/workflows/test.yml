name: PR Checks
# Fires on:
#   - push to develop (fast feedback on work-in-progress)
#   - push to main (post-merge regression gate; deploy fires only on green)
#   - pull_request targeting main OR develop (pre-merge gate)
#   - workflow_dispatch (manual re-run)
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      # CF-048 — block the build on production HIGH+ CVEs. `--omit=dev`
      # excludes top-level devDependencies; @astrojs/cloudflare
      # (production) transitively pulls miniflare/wrangler/undici, but
      # those build-time tooling CVEs DO need a triage path even though
      # the deployed worker bundle running on workerd never executes
      # them — Dependabot is the right channel and this gate forces the
      # operator to engage it instead of letting CVEs accumulate
      # silently. The earlier "HIGH+ advisory-only" pass was the
      # failure mode CF-048 flagged.
      - name: npm audit (production deps, high+ — blocking)
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      # CF-069 — fail the build when source/tests/docs reference a REQ
      # id that doesn't exist in sdd/. Catches drift between docs +
      # SDD spec ahead of doc-updater's per-push pass.
      - name: REQ backlink coverage
        run: node scripts/check-req-backlinks.mjs

      # CF-005 + CF-020: assert wrangler.toml max_retries literals match
      # MAX_QUEUE_ATTEMPTS in queue-handler.ts AND binding-shape parity
      # between top-level and [env.integration.*]. A binding added to
      # production but missing from integration would silently 500 on
      # the integration deploy without this gate.
      - name: Wrangler env parity
        run: node scripts/check-wrangler-env-parity.mjs

      # AD20 — fail the build if any src/pages/** or src/components/**
      # statically imports a top-level src/scripts/*.ts file. That
      # double-bundles the script (standalone IIFE + page chunk),
      # which silently registered duplicate document-level listeners
      # and broke favourite toggles in PRs #182/#184/#185.
      - name: Pattern B import discipline (AD20)
        run: node scripts/check-no-page-pattern-b.mjs

      - name: Dead code check
        run: npm run knip

      - name: Type check
        run: npm run typecheck

      - name: Build (populates dist/ for Workers test pool)
        run: npm run build

      - name: Tests
        run: npm test
