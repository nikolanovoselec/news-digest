name: PR Checks
# Fires on:
#   - push to develop (fast feedback on work-in-progress)
#   - push to main (post-merge regression gate; deploy fires only on green)
#   - pull_request targeting main OR develop (pre-merge gate)
#   - workflow_dispatch (manual re-run)
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      # Audit the production-dep tree. `--omit=dev` excludes top-level
      # devDependencies, but the @astrojs/cloudflare adapter (production)
      # transitively pulls in miniflare/wrangler/undici (build-time
      # tooling that never reaches the deployed Worker bundle running
      # on workerd). Those transitives generate the bulk of the HIGH
      # findings, so we gate on CRITICAL only — the worst class still
      # blocks the build, and HIGH+ findings remain visible in the logs
      # for operators to triage via Dependabot. Tightening to HIGH+
      # would block on transitive-only CVEs that have no production
      # path; that's the failure mode of the previous advisory-only
      # configuration we just fixed.
      # Advisory-only HIGH+ surface so operators see the full list per
      # push and can drive Dependabot triage without the build failing
      # on transitive build-tool CVEs.
      - name: npm audit (production deps, high+ — advisory only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - name: npm audit (production deps, critical+ — blocking)
        run: npm audit --omit=dev --audit-level=critical

      - name: Lint
        run: npm run lint

      # CF-069 — fail the build when source/tests/docs reference a REQ
      # id that doesn't exist in sdd/. Catches drift between docs +
      # SDD spec ahead of doc-updater's per-push pass.
      - name: REQ backlink coverage
        run: node scripts/check-req-backlinks.mjs

      - name: Dead code check
        run: npm run knip

      - name: Type check
        run: npm run typecheck

      - name: Build (populates dist/ for Workers test pool)
        run: npm run build

      - name: Tests
        run: npm test
