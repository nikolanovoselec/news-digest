name: PR Checks
# Fires on:
#   - push to develop (fast feedback on work-in-progress)
#   - push to main (post-merge regression gate; deploy fires only on green)
#   - pull_request targeting main OR develop (pre-merge gate)
#   - workflow_dispatch (manual re-run)
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Lint
        run: npm run lint

      - name: Dead code check
        run: npm run knip

      - name: Type check
        run: npm run typecheck

      - name: Build (populates dist/ for Workers test pool)
        run: npm run build

      - name: Tests
        run: npm test
