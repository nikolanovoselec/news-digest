name: Scorecard

on:
  # OSSF Scorecard rejects non-default-branch invocations with
  # "Only the default branch main is supported" — keep main-only.
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: read-all

# NOTE: no top-level `env:` or `defaults:` blocks — ossf/scorecard-action
# rejects workflows that carry global env vars or defaults (see
# https://github.com/ossf/scorecard-action#workflow-restrictions).
# If a step needs an env var, put it in that step's own `env:` block.

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
