name: Deploy

# main is a protected branch; the only push that reaches it is a
# merged PR. workflow_run waits for that PR's "PR Checks" to finish
# on the merge commit and only deploys when it ended green. This
# closes the "we shipped a broken main" window that plain
# `push: [main]` left open when the checks and deploy triggered
# in parallel off the same SHA. workflow_dispatch stays so a
# stuck deploy can be re-run manually.
on:
  workflow_run:
    workflows: ['PR Checks']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    # On workflow_run: only deploy when the preceding PR Checks run
    # ended green. On workflow_dispatch (manual re-run): always run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    needs: []
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      # Defence-in-depth: re-run the same audit gate that PR Checks
      # used. Catches CRITICAL CVEs introduced between the merge and
      # the deploy (transient transitive bumps via Dependabot, lockfile
      # regenerations, etc.). Mirrors the test.yml policy — gates on
      # CRITICAL only because HIGH+ findings often land in build-tool
      # transitives (miniflare/wrangler/undici under @astrojs/cloudflare)
      # that never reach the deployed Worker bundle.
      - name: npm audit (production deps, high+ — advisory only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - name: npm audit (production deps, critical+ — blocking)
        run: npm audit --omit=dev --audit-level=critical

      - name: Build
        run: npm run build

      - name: Create .assetsignore (exclude _worker.js from asset upload)
        run: |
          printf '_worker.js\n_routes.json\n' > dist/.assetsignore

      # Provision Cloudflare resources idempotently before deploy.
      # Pattern: look up by name; create if missing; for D1 + KV,
      # patch wrangler.toml in the ephemeral CI workspace with the
      # resolved id so wrangler deploy binds the right resource.

      - name: Provision D1 - ai-news-digest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          DB_ID=$(npx --yes wrangler d1 list --json 2>/dev/null \
            | jq -r '.[] | select(.name == "ai-news-digest") | .uuid' | head -1)
          if [ -z "$DB_ID" ]; then
            DB_ID=$(npx --yes wrangler d1 create ai-news-digest 2>&1 \
              | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          fi
          [ -n "$DB_ID" ] || { echo "::error::Failed to resolve D1 id"; exit 1; }
          awk -v new="$DB_ID" '
            $0 == "[[d1_databases]]" { in_sec=1; print; next }
            /^\[/ && in_sec && $0 != "[[d1_databases]]" { in_sec=0 }
            in_sec && $1 == "database_id" { print "database_id = \"" new "\""; next }
            { print }
          ' wrangler.toml > wrangler.toml.tmp && mv wrangler.toml.tmp wrangler.toml
          echo "D1 ai-news-digest = $DB_ID"

      - name: Provision KV - ai-news-digest-kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          KV_ID=$(npx --yes wrangler kv namespace list 2>/dev/null \
            | jq -r '.[] | select(.title == "ai-news-digest-kv") | .id' | head -1)
          if [ -z "$KV_ID" ]; then
            KV_ID=$(npx --yes wrangler kv namespace create ai-news-digest-kv 2>&1 \
              | grep -oE '"id": *"[a-f0-9]+"' | head -1 | grep -oE '[a-f0-9]+$')
          fi
          [ -n "$KV_ID" ] || { echo "::error::Failed to resolve KV id"; exit 1; }
          awk -v new="$KV_ID" '
            $0 == "[[kv_namespaces]]" { in_sec=1; print; next }
            /^\[/ && in_sec && $0 != "[[kv_namespaces]]" { in_sec=0 }
            in_sec && $1 == "id" { print "id = \"" new "\""; next }
            { print }
          ' wrangler.toml > wrangler.toml.tmp && mv wrangler.toml.tmp wrangler.toml
          echo "KV ai-news-digest-kv = $KV_ID"

      - name: Provision queue - scrape-coordinator
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler queues info scrape-coordinator >/dev/null 2>&1 || npx --yes wrangler queues create scrape-coordinator

      - name: Provision queue - scrape-chunks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler queues info scrape-chunks >/dev/null 2>&1 || npx --yes wrangler queues create scrape-chunks

      - name: Provision queue - scrape-finalize
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler queues info scrape-finalize >/dev/null 2>&1 || npx --yes wrangler queues create scrape-finalize

      - name: Provision queue - dedup-sweep
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler queues info dedup-sweep >/dev/null 2>&1 || npx --yes wrangler queues create dedup-sweep

      # REQ-PIPE-003 — Vectorize index for semantic same-story dedup.
      # 768-dim cosine matches the @cf/baai/bge-base-en-v1.5 embedding
      # model. Forks that swap the model must update both this step
      # and src/lib/embeddings.ts in the same change.
      - name: Provision Vectorize index
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler vectorize get ai-news-embeddings >/dev/null 2>&1 || npx --yes wrangler vectorize create ai-news-embeddings --dimensions=768 --metric=cosine

      # Drift-tolerant migration apply. SQLite has no `ADD COLUMN IF
      # NOT EXISTS`, so a migration manually run out-of-band (during
      # debugging, a hotfix, or a prior failed deploy) leaves the
      # column in place but unrecorded in `d1_migrations`. The next
      # `wrangler d1 migrations apply` then errors on "duplicate
      # column" / "table already exists" and aborts the deploy.
      # We retry: on each drift error, parse the migration filename
      # from the output, stamp it into `d1_migrations` as applied
      # (the schema already reflects it), and re-run wrangler. Real
      # SQL errors (constraint violations, syntax) bubble up.
      - name: Apply D1 migrations (drift-tolerant)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -uo pipefail
          for try in 1 2 3 4 5; do
            OUT=$(npx --yes wrangler d1 migrations apply DB --remote 2>&1) && RC=0 || RC=$?
            echo "$OUT"
            if [ "$RC" -eq 0 ]; then
              echo "Migrations applied cleanly (try $try)"
              exit 0
            fi
            if echo "$OUT" | grep -qiE 'duplicate column|already exists'; then
              MIG=$(echo "$OUT" | grep -oE '[0-9]{4}_[A-Za-z0-9_]+\.sql' | head -1)
              if [ -z "$MIG" ]; then
                echo "::error::Drift detected but could not parse failing migration name"
                exit 1
              fi
              echo "::warning::Schema drift on $MIG — marking as applied and retrying"
              npx --yes wrangler d1 execute DB --remote --command \
                "INSERT OR IGNORE INTO d1_migrations (name, applied_at) VALUES ('$MIG', datetime('now'))"
              continue
            fi
            echo "::error::Migration apply failed with non-drift error"
            exit "$RC"
          done
          echo "::error::Migrations did not converge after 5 retries"
          exit 1

      - name: Push Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          OAUTH_JWT_SECRET: ${{ secrets.OAUTH_JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          APP_URL: ${{ secrets.APP_URL }}
          DEV_BYPASS_TOKEN: ${{ secrets.DEV_BYPASS_TOKEN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          CF_ACCESS_AUD: ${{ secrets.CF_ACCESS_AUD }}
        run: |
          set -e
          # Required regardless of which sign-in providers are enabled —
          # OAUTH_JWT_SECRET signs the session cookie, APP_URL anchors
          # the Origin gate. Both are non-negotiable.
          for name in OAUTH_JWT_SECRET APP_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Required secret '$name' is not set in the repo." \
                   "Add it under Settings → Secrets and variables → Actions."
              exit 1
            fi
            TMP=$(mktemp)
            printf '%s' "${!name}" > "$TMP"
            npx --yes wrangler secret put "$name" < "$TMP"
            rm "$TMP"
          done

          # Sign-in providers — each pair is independently optional, but
          # at least ONE complete pair must be set or the app has no way
          # for users to authenticate. Partial pairs (id without secret
          # or vice versa) are rejected so a half-configured provider
          # never reaches runtime.
          PROVIDERS_CONFIGURED=0
          push_provider_pair() {
            local label="$1"
            local id_var="$2"
            local secret_var="$3"
            local id_val="${!id_var:-}"
            local secret_val="${!secret_var:-}"
            if [ -n "$id_val" ] && [ -n "$secret_val" ]; then
              for name in "$id_var" "$secret_var"; do
                TMP=$(mktemp)
                printf '%s' "${!name}" > "$TMP"
                npx --yes wrangler secret put "$name" < "$TMP"
                rm "$TMP"
              done
              echo "$label sign-in: configured"
              PROVIDERS_CONFIGURED=$((PROVIDERS_CONFIGURED + 1))
            elif [ -n "$id_val" ] || [ -n "$secret_val" ]; then
              echo "::error::$label sign-in: set BOTH ${id_var} and ${secret_var}, or neither."
              exit 1
            else
              echo "$label sign-in: not configured"
            fi
          }
          push_provider_pair GitHub GH_OAUTH_CLIENT_ID GH_OAUTH_CLIENT_SECRET
          push_provider_pair Google GOOGLE_OAUTH_CLIENT_ID GOOGLE_OAUTH_CLIENT_SECRET
          if [ "$PROVIDERS_CONFIGURED" -eq 0 ]; then
            echo "::error::No sign-in provider is configured." \
                 "Set GH_OAUTH_CLIENT_ID + GH_OAUTH_CLIENT_SECRET" \
                 "or GOOGLE_OAUTH_CLIENT_ID + GOOGLE_OAUTH_CLIENT_SECRET" \
                 "(or both) under Settings → Secrets and variables → Actions."
            exit 1
          fi

          # Optional: Resend (digest-ready emails). Both keys must be set
          # together — partial config is rejected so the runtime never
          # tries to fire an email with half the credentials. When unset,
          # the email step is skipped at runtime (digests still generate).
          if [ -n "${RESEND_API_KEY:-}" ] && [ -n "${RESEND_FROM:-}" ]; then
            for name in RESEND_API_KEY RESEND_FROM; do
              TMP=$(mktemp)
              printf '%s' "${!name}" > "$TMP"
              npx --yes wrangler secret put "$name" < "$TMP"
              rm "$TMP"
            done
          elif [ -n "${RESEND_API_KEY:-}" ] || [ -n "${RESEND_FROM:-}" ]; then
            echo "::error::Set BOTH RESEND_API_KEY and RESEND_FROM, or neither."
            exit 1
          else
            echo "Resend not configured — daily digest emails disabled (digest generation continues)."
          fi

          # Optional: DEV_BYPASS_TOKEN enables the /api/dev/login endpoint
          # used by scripts/e2e-test.sh. If the repo secret is unset,
          # skip — the endpoint will return 404 at runtime.
          if [ -n "${DEV_BYPASS_TOKEN:-}" ]; then
            TMP=$(mktemp)
            printf '%s' "$DEV_BYPASS_TOKEN" > "$TMP"
            npx --yes wrangler secret put DEV_BYPASS_TOKEN < "$TMP"
            rm "$TMP"
          fi

          # Wipe any pre-existing DEV_BYPASS_USER_ID secret. Forks that
          # deployed before migration 0006 may have set this to the
          # operator's real user id, which would defeat the synthetic-
          # __e2e__ sandbox. The secret is intentionally not managed by
          # the workflow anymore — `/api/dev/login` falls back to the
          # __e2e__ row when this is unset, which is what every fork
          # should run with. The delete is idempotent (silenced on
          # not-found) so subsequent deploys are no-ops.
          npx --yes wrangler secret delete DEV_BYPASS_USER_ID --force 2>/dev/null \
            || echo "DEV_BYPASS_USER_ID not set on Worker — nothing to clear"

          # Optional: ADMIN_EMAIL gates /api/admin/* (REQ-AUTH-001 AC 8).
          # When unset every admin endpoint returns 403 — fork-friendly
          # default that locks down the surface until an operator opts in.
          if [ -n "${ADMIN_EMAIL:-}" ]; then
            TMP=$(mktemp)
            printf '%s' "$ADMIN_EMAIL" > "$TMP"
            npx --yes wrangler secret put ADMIN_EMAIL < "$TMP"
            rm "$TMP"
          else
            echo "ADMIN_EMAIL not configured — admin endpoints will return 403"
          fi

          # CF_ACCESS_AUD validates the aud claim of the Cf-Access-Jwt-
          # Assertion header (REQ-AUTH-001 AC 8). Strongly recommended
          # for any deploy that binds Cloudflare Access to a custom
          # domain — without it, an attacker hitting the *.workers.dev
          # URL (where Access is NOT enforced) can forge a JWT-shaped
          # header and pass Layer 1 of admin-auth. workers_dev=false
          # in wrangler.toml closes that bypass independently, but
          # CF_ACCESS_AUD remains the in-Worker defence-in-depth gate.
          #
          # Emit a CI warning (non-blocking) when unset on production
          # deploys so the gap surfaces every time without breaking
          # forks that don't bind Access at all (CF-031).
          if [ -n "${CF_ACCESS_AUD:-}" ]; then
            TMP=$(mktemp)
            printf '%s' "$CF_ACCESS_AUD" > "$TMP"
            npx --yes wrangler secret put CF_ACCESS_AUD < "$TMP"
            rm "$TMP"
          else
            echo "::warning title=CF_ACCESS_AUD unset::Cloudflare Access aud-claim validation disabled. Set CF_ACCESS_AUD to the Access application's audience tag for production deploys, OR confirm Cloudflare Access is not bound on this fork. See documentation/configuration.md#setting-cf_access_aud."
          fi

      - name: Deploy
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          # Wrangler's esbuild pass re-bundles dist/_worker.js/ and
          # emits "Duplicate key" warnings for legitimate HTML5 entity
          # aliases in Astro's bundled `entities` dependency (nrarr,
          # acute, euro, Vdash). They're harmless — later-declared
          # keys win in the resulting object — but they flood the
          # deploy log. Filter the whole warning block (header line
          # + context up to the next blank line) out of the tee'd
          # output; the raw log still lands in deploy.log for
          # reference. We also drop any leftover "The original key"
          # context lines so partial blocks don't bleed through.
          npx --yes wrangler deploy 2>&1 | tee deploy.log | \
            awk '
              /^▲ \[WARNING\] Duplicate key ".*" in object literal \[duplicate-object-key\]/ { skip=1; next }
              skip && /^$/ { skip=0; next }
              skip { next }
              { print }
            '
          # Extract the workers.dev URL wrangler prints on success.
          WORKER_URL=$(grep -oE 'https://[^ ]+\.workers\.dev' deploy.log | head -n1 || true)
          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $WORKER_URL"

      - name: Bind custom domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          set -e
          if [ -z "$APP_URL" ]; then
            echo "APP_URL not set; skipping custom-domain binding"
            exit 0
          fi
          # Extract hostname from APP_URL (strip scheme + path + port).
          # Case-insensitive scheme match so HTTPS:// / MIXED-case works too.
          HOST=$(printf '%s' "$APP_URL" | sed -E 's|^[A-Za-z]+://||; s|/.*$||; s|:.*$||')
          if [ -z "$HOST" ]; then
            echo "Could not extract hostname from APP_URL; skipping"
            exit 0
          fi
          # Require a fully-qualified domain (at least one dot). A single-label
          # APP_URL like `localhost` has no Cloudflare zone and isn't a valid
          # custom-domain target.
          case "$HOST" in
            *.*) : ;;
            *)
              echo "APP_URL hostname '$HOST' is not fully-qualified (needs at least one dot); skipping bind"
              exit 0
              ;;
          esac
          echo "Binding Worker to custom domain: $HOST"

          # Derive the Worker service name from wrangler.toml so a fork that
          # renames the worker doesn't end up binding the zone to a
          # non-existent service.
          SERVICE=$(grep -E '^name[[:space:]]*=' wrangler.toml | head -1 \
            | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$SERVICE" ]; then
            echo "Could not parse 'name = ...' from wrangler.toml"
            exit 1
          fi
          echo "Worker service: $SERVICE"

          # Find the Cloudflare zone for the hostname by trying progressively
          # shorter parent domains (host → ...rest.of.host → apex).
          CANDIDATE="$HOST"
          ZONE_ID=""
          while [ -n "$CANDIDATE" ] && [ "$CANDIDATE" != "${CANDIDATE#*.}" ]; do
            ZONE_ID=$(curl -fsS \
              "https://api.cloudflare.com/client/v4/zones?name=$CANDIDATE" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              | jq -r '.result[0].id // empty')
            if [ -n "$ZONE_ID" ]; then
              echo "Found zone for $CANDIDATE: $ZONE_ID"
              break
            fi
            CANDIDATE="${CANDIDATE#*.}"
          done
          if [ -z "$ZONE_ID" ]; then
            echo "No Cloudflare zone found for $HOST in this account; cannot bind custom domain"
            echo "Either add the zone to Cloudflare first, or point APP_URL at the workers.dev URL"
            exit 1
          fi

          # Build the JSON body via jq so hostname/service values can't break
          # out of the JSON string context (cheap safety for a secret-sourced value).
          BODY=$(jq -cn \
            --arg z "$ZONE_ID" --arg h "$HOST" --arg s "$SERVICE" \
            '{zone_id:$z, hostname:$h, service:$s, environment:"production"}')

          # Idempotent attach: Cloudflare's PUT endpoint creates-or-updates
          # the binding between this hostname and the Worker.
          RESP=$(mktemp)
          HTTP_CODE=$(curl -sS -o "$RESP" -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          SUCCESS=$(jq -r '.success' < "$RESP" 2>/dev/null || echo "")
          if [ "$HTTP_CODE" != "200" ] || [ "$SUCCESS" != "true" ]; then
            echo "Custom-domain bind failed (HTTP $HTTP_CODE):"
            cat "$RESP"
            rm -f "$RESP"
            exit 1
          fi
          rm -f "$RESP"
          echo "Custom domain $HOST → $SERVICE (zone $ZONE_ID) attached"

      - name: Smoke test
        env:
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          # Prefer the custom domain (APP_URL) since that's where users land;
          # fall back to the workers.dev URL if the custom domain hasn't
          # propagated yet.
          for URL in "$APP_URL" "$WORKER_URL"; do
            if [ -z "$URL" ]; then continue; fi
            CODE=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" "$URL/" || echo "000")
            echo "GET $URL/ → HTTP $CODE"
            case "$CODE" in
              200|303)
                echo "Smoke test passed via $URL"
                exit 0
                ;;
            esac
          done
          echo "No reachable smoke-test URL"
          exit 1

      # End-to-end API smoke step intentionally removed. scripts/e2e-test.sh
      # still exists in the repo for manual invocation when needed, but
      # running it on every deploy triggers a full-cycle scrape (LLM cost
      # and ~10 min wall-clock) and mutates the owner's account state
      # (tags/stars/settings). The reachability smoke above plus
      # PR Checks on the preceding commit are enough to confirm a deploy
      # is healthy. Manual run-once: `bash scripts/e2e-test.sh --force-prod`.
