name: Deploy Integration

# Manual trigger ONLY. Operator workflow: land changes on develop
# normally; when ready to smoke-test on the live edge, hit
# Actions → Deploy Integration → Run workflow. The deploy always
# pulls from the current develop HEAD regardless of which branch
# the dispatch was fired from in the UI.
#
# All Cloudflare resources are env-scoped via wrangler.toml's
# [env.integration] block — separate D1, KV, queues, all with
# `-integration` suffixes. Crons are intentionally OFF on integration;
# trigger scrape runs manually via /api/admin/force-refresh.
on:
  workflow_dispatch:

concurrency:
  group: deploy-integration
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare Workers (integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # `environment: integration` enables GitHub's standard secret-
    # resolution fallback: env-scoped secrets win when defined,
    # otherwise the repo-level secret is used. Default state: no
    # env-scoped secrets, everything falls through to repo level
    # (CLOUDFLARE_API_TOKEN, OAUTH_JWT_SECRET, GOOGLE_OAUTH_*).
    # If integration ever needs a different value (e.g. a separate
    # JWT secret for cross-env identity isolation), add it under
    # Settings → Environments → integration; the workflow picks it
    # up automatically with no code change. APP_URL stays in
    # wrangler.toml [env.integration.vars] (public hostname).
    environment: integration
    steps:
      # Always deploy develop's current HEAD regardless of which branch
      # the dispatch was fired from in the UI. Develop is the single
      # source of truth for what gets smoke-tested on integration.
      - uses: actions/checkout@v6
        with:
          ref: develop

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build
        run: npm run build

      - name: Create .assetsignore (exclude _worker.js from asset upload)
        run: |
          printf '_worker.js\n_routes.json\n' > dist/.assetsignore

      # Provision Cloudflare resources idempotently before deploy.
      # Same pattern as deploy.yml. Integration env uses suffixed names
      # so production resources are never touched. D1 + KV ids are
      # patched into the env.integration sections of wrangler.toml in
      # the ephemeral CI workspace.

      - name: Provision D1 - ai-news-digest-integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          DB_ID=$(npx --yes wrangler d1 list --json 2>/dev/null \
            | jq -r '.[] | select(.name == "ai-news-digest-integration") | .uuid' | head -1)
          if [ -z "$DB_ID" ]; then
            DB_ID=$(npx --yes wrangler d1 create ai-news-digest-integration 2>&1 \
              | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          fi
          [ -n "$DB_ID" ] || { echo "::error::Failed to resolve integration D1 id"; exit 1; }
          awk -v new="$DB_ID" '
            BEGIN { patched=0 }
            $0 == "[[env.integration.d1_databases]]" { in_sec=1; print; next }
            /^\[/ && in_sec && $0 != "[[env.integration.d1_databases]]" { in_sec=0 }
            in_sec && $1 == "database_id" { print "database_id = \"" new "\""; patched=1; next }
            { print }
            END { if (!patched) exit 1 }
          ' wrangler.toml > wrangler.toml.tmp || { echo "::error::wrangler.toml missing [[env.integration.d1_databases]] database_id line"; exit 1; }
          mv wrangler.toml.tmp wrangler.toml
          echo "D1 ai-news-digest-integration = $DB_ID"

      - name: Provision KV - ai-news-digest-integration-kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          KV_ID=$(npx --yes wrangler kv namespace list 2>/dev/null \
            | jq -r '.[] | select(.title == "ai-news-digest-integration-kv") | .id' | head -1)
          if [ -z "$KV_ID" ]; then
            KV_ID=$(npx --yes wrangler kv namespace create ai-news-digest-integration-kv 2>&1 \
              | sed -nE 's/.*"id":[[:space:]]*"([a-f0-9]+)".*/\1/p' | head -1)
          fi
          [ -n "$KV_ID" ] || { echo "::error::Failed to resolve integration KV id"; exit 1; }
          awk -v new="$KV_ID" '
            BEGIN { patched=0 }
            $0 == "[[env.integration.kv_namespaces]]" { in_sec=1; print; next }
            /^\[/ && in_sec && $0 != "[[env.integration.kv_namespaces]]" { in_sec=0 }
            in_sec && $1 == "id" { print "id = \"" new "\""; patched=1; next }
            { print }
            END { if (!patched) exit 1 }
          ' wrangler.toml > wrangler.toml.tmp || { echo "::error::wrangler.toml missing [[env.integration.kv_namespaces]] id line"; exit 1; }
          mv wrangler.toml.tmp wrangler.toml
          echo "KV ai-news-digest-integration-kv = $KV_ID"

      - name: Provision queue - scrape-coordinator-integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler queues info scrape-coordinator-integration >/dev/null 2>&1 || npx --yes wrangler queues create scrape-coordinator-integration

      - name: Provision queue - scrape-chunks-integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler queues info scrape-chunks-integration >/dev/null 2>&1 || npx --yes wrangler queues create scrape-chunks-integration

      - name: Provision queue - scrape-finalize-integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler queues info scrape-finalize-integration >/dev/null 2>&1 || npx --yes wrangler queues create scrape-finalize-integration

      - name: Provision queue - dedup-sweep-integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler queues info dedup-sweep-integration >/dev/null 2>&1 || npx --yes wrangler queues create dedup-sweep-integration

      - name: Provision queue - pipeline-jobs-integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler queues info pipeline-jobs-integration >/dev/null 2>&1 || npx --yes wrangler queues create pipeline-jobs-integration

      # REQ-PIPE-003 — integration uses its own Vectorize index so an
      # integration retention sweep can never delete production vectors.
      - name: Provision Vectorize index (integration)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler vectorize get ai-news-embeddings-integration >/dev/null 2>&1 || npx --yes wrangler vectorize create ai-news-embeddings-integration --dimensions=768 --metric=cosine

      # Drift-tolerant migration apply — see deploy.yml for full
      # rationale. Same loop, scoped to the integration env.
      - name: Apply D1 migrations (integration, drift-tolerant)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -uo pipefail
          for try in 1 2 3 4 5; do
            OUT=$(npx --yes wrangler d1 migrations apply DB --remote --env integration 2>&1) && RC=0 || RC=$?
            echo "$OUT"
            if [ "$RC" -eq 0 ]; then
              echo "Migrations applied cleanly (try $try)"
              exit 0
            fi
            if echo "$OUT" | grep -qiE 'duplicate column|already exists'; then
              MIG=$(echo "$OUT" | grep -oE '[0-9]{4}_[A-Za-z0-9_]+\.sql' | head -1)
              if [ -z "$MIG" ]; then
                echo "::error::Drift detected but could not parse failing migration name"
                exit 1
              fi
              echo "::warning::Schema drift on $MIG — marking as applied and retrying"
              npx --yes wrangler d1 execute DB --remote --env integration --command \
                "INSERT OR IGNORE INTO d1_migrations (name, applied_at) VALUES ('$MIG', datetime('now'))"
              continue
            fi
            echo "::error::Migration apply failed with non-drift error"
            exit "$RC"
          done
          echo "::error::Migrations did not converge after 5 retries"
          exit 1

      - name: Push Worker secrets (integration)
        # Secret references mirror deploy.yml exactly so any repo-level
        # secret automatically reaches integration via env-fallback.
        # Per-env override: add the secret under Settings → Environments
        # → integration; GitHub picks the env-scoped value over the
        # repo-level one.
        #
        # APP_URL is sourced from `vars.APP_URL` (a GitHub Environment
        # *variable*, NOT a secret) — the integration hostname is
        # public, fork-specific, and the fork operator sets it under
        # Settings → Environments → integration → Variables. Codeflare
        # pattern. No hardcoded hostnames in the repo.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          OAUTH_JWT_SECRET: ${{ secrets.OAUTH_JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          DEV_BYPASS_TOKEN: ${{ secrets.DEV_BYPASS_TOKEN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          set -e
          # Required: OAUTH_JWT_SECRET signs session cookies, APP_URL
          # anchors the OAuth-callback host. APP_URL comes from the
          # GitHub Environment variable (vars.APP_URL); without it the
          # fork operator hasn't configured the integration target yet.
          for name in OAUTH_JWT_SECRET APP_URL; do
            if [ -z "${!name:-}" ]; then
              if [ "$name" = "APP_URL" ]; then
                echo "::error::vars.APP_URL not set." \
                     "Add it under Settings → Environments → integration → Variables." \
                     "Value should be the public URL the integration worker will serve" \
                     "(custom domain like https://news.example.com, or a *.workers.dev URL)."
              else
                echo "::error::Required secret '$name' is not set." \
                     "Add it at the repo level (Settings → Secrets → Actions)" \
                     "or scope to integration (Settings → Environments → integration)."
              fi
              exit 1
            fi
            TMP=$(mktemp)
            printf '%s' "${!name}" > "$TMP"
            npx --yes wrangler secret put "$name" --env integration < "$TMP"
            rm "$TMP"
          done

          # Sign-in providers — each pair independently optional. Same
          # logic as deploy.yml: at least one must be configured. Per-
          # provider rendering on the landing page reflects which
          # creds reached the worker.
          PROVIDERS_CONFIGURED=0
          push_provider_pair() {
            local label="$1"
            local id_var="$2"
            local secret_var="$3"
            local id_val="${!id_var:-}"
            local secret_val="${!secret_var:-}"
            if [ -n "$id_val" ] && [ -n "$secret_val" ]; then
              for name in "$id_var" "$secret_var"; do
                TMP=$(mktemp)
                printf '%s' "${!name}" > "$TMP"
                npx --yes wrangler secret put "$name" --env integration < "$TMP"
                rm "$TMP"
              done
              echo "$label sign-in: configured"
              PROVIDERS_CONFIGURED=$((PROVIDERS_CONFIGURED + 1))
            elif [ -n "$id_val" ] || [ -n "$secret_val" ]; then
              echo "::error::$label sign-in: set BOTH ${id_var} and ${secret_var}, or neither."
              exit 1
            else
              echo "$label sign-in: not configured"
            fi
          }
          push_provider_pair GitHub GH_OAUTH_CLIENT_ID GH_OAUTH_CLIENT_SECRET
          push_provider_pair Google GOOGLE_OAUTH_CLIENT_ID GOOGLE_OAUTH_CLIENT_SECRET
          if [ "$PROVIDERS_CONFIGURED" -eq 0 ]; then
            echo "::error::No sign-in provider configured for integration."
            exit 1
          fi

          # Optional: Resend (digest emails).
          if [ -n "${RESEND_API_KEY:-}" ] && [ -n "${RESEND_FROM:-}" ]; then
            for name in RESEND_API_KEY RESEND_FROM; do
              TMP=$(mktemp)
              printf '%s' "${!name}" > "$TMP"
              npx --yes wrangler secret put "$name" --env integration < "$TMP"
              rm "$TMP"
            done
          elif [ -n "${RESEND_API_KEY:-}" ] || [ -n "${RESEND_FROM:-}" ]; then
            echo "::error::Set BOTH RESEND_API_KEY and RESEND_FROM, or neither."
            exit 1
          else
            echo "Resend not configured — daily digest emails disabled."
          fi

          # Optional: DEV_BYPASS_TOKEN.
          if [ -n "${DEV_BYPASS_TOKEN:-}" ]; then
            TMP=$(mktemp)
            printf '%s' "$DEV_BYPASS_TOKEN" > "$TMP"
            npx --yes wrangler secret put DEV_BYPASS_TOKEN --env integration < "$TMP"
            rm "$TMP"
          fi

          # Wipe any pre-existing DEV_BYPASS_USER_ID secret (matches deploy.yml).
          printf 'y\n' | npx --yes wrangler secret delete DEV_BYPASS_USER_ID --env integration \
            || echo "DEV_BYPASS_USER_ID delete returned non-zero (likely already absent)"

          # Optional: ADMIN_EMAIL.
          if [ -n "${ADMIN_EMAIL:-}" ]; then
            TMP=$(mktemp)
            printf '%s' "$ADMIN_EMAIL" > "$TMP"
            npx --yes wrangler secret put ADMIN_EMAIL --env integration < "$TMP"
            rm "$TMP"
          else
            echo "ADMIN_EMAIL not configured — admin endpoints will return 403"
          fi

          # CF_ACCESS_AUD is intentionally NOT pushed on integration:
          # integration runs without a Cloudflare Access perimeter, so
          # the admin gate (REQ-AUTH-001 AC 8 / AD29) reduces to
          # session + ADMIN_EMAIL alone. Force the secret unset on
          # every deploy so a stale repo-level value cannot re-enable
          # Layer 0 against an integration deploy that has no Access
          # bound in front of it. wrangler 4.x has no --force on
          # `secret delete` and pipes `y\n` to its confirmation prompt.
          # If the secret isn't present wrangler exits non-zero with
          # "Secret not found", which we tolerate.
          printf 'y\n' | npx --yes wrangler secret delete CF_ACCESS_AUD --env integration \
            || echo "CF_ACCESS_AUD delete returned non-zero (likely already absent)"

      - name: Deploy (integration)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          # Same duplicate-key warning filter as deploy.yml — Astro's
          # bundled `entities` dependency emits harmless dup-key warnings.
          npx --yes wrangler deploy --env integration 2>&1 | tee deploy.log | \
            awk '
              /^▲ \[WARNING\] Duplicate key ".*" in object literal \[duplicate-object-key\]/ { skip=1; next }
              skip && /^$/ { skip=0; next }
              skip { next }
              { print }
            '
          WORKER_URL=$(grep -oE 'https://[^ ]+\.workers\.dev' deploy.log | head -n1 || true)
          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $WORKER_URL"

      - name: Bind custom domain (integration)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          set -e
          # APP_URL comes from the integration GitHub Environment variable
          # (vars.APP_URL). When unset (fork hasn't configured a custom
          # domain), the bind step is a no-op and the worker is reachable
          # only at its *.workers.dev URL.
          if [ -z "$APP_URL" ]; then
            echo "vars.APP_URL not set — skipping custom-domain bind (workers.dev URL only)"
            exit 0
          fi
          HOST=$(printf '%s' "$APP_URL" | sed -E 's|^[A-Za-z]+://||; s|/.*$||; s|:.*$||')
          if [ -z "$HOST" ]; then
            echo "Could not extract hostname from APP_URL; skipping"
            exit 0
          fi
          case "$HOST" in
            *.*) : ;;
            *)
              echo "APP_URL hostname '$HOST' is not fully-qualified; skipping bind"
              exit 0
              ;;
          esac
          echo "Binding integration Worker to custom domain: $HOST"

          # Worker service name from the env-scoped block.
          SERVICE=$(awk '
            $0 == "[env.integration]" { in_sec=1; next }
            /^\[/ && in_sec && $0 != "[env.integration]" { in_sec=0 }
            in_sec && $1 == "name" {
              n = split($0, parts, "\"")
              if (n >= 2) { print parts[2]; exit }
            }
          ' wrangler.toml)
          if [ -z "$SERVICE" ]; then
            echo "Could not parse [env.integration].name from wrangler.toml"
            exit 1
          fi
          echo "Worker service: $SERVICE"

          # Find the zone for the hostname (host → ...rest.of.host → apex).
          CANDIDATE="$HOST"
          ZONE_ID=""
          while [ -n "$CANDIDATE" ] && [ "$CANDIDATE" != "${CANDIDATE#*.}" ]; do
            ZONE_ID=$(curl -fsS \
              "https://api.cloudflare.com/client/v4/zones?name=$CANDIDATE" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              | jq -r '.result[0].id // empty')
            if [ -n "$ZONE_ID" ]; then
              echo "Found zone for $CANDIDATE: $ZONE_ID"
              break
            fi
            CANDIDATE="${CANDIDATE#*.}"
          done
          if [ -z "$ZONE_ID" ]; then
            echo "No Cloudflare zone found for $HOST in this account; cannot bind custom domain"
            exit 1
          fi

          BODY=$(jq -cn \
            --arg z "$ZONE_ID" --arg h "$HOST" --arg s "$SERVICE" \
            '{zone_id:$z, hostname:$h, service:$s, environment:"production"}')

          RESP=$(mktemp)
          HTTP_CODE=$(curl -sS -o "$RESP" -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          SUCCESS=$(jq -r '.success' < "$RESP" 2>/dev/null || echo "")
          if [ "$HTTP_CODE" != "200" ] || [ "$SUCCESS" != "true" ]; then
            echo "Custom-domain bind failed (HTTP $HTTP_CODE):"
            cat "$RESP"
            rm -f "$RESP"
            exit 1
          fi
          rm -f "$RESP"
          echo "Custom domain $HOST → $SERVICE (zone $ZONE_ID) attached"
